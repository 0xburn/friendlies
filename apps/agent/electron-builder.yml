appId: com.friendlies.agent
productName: friendlies
copyright: Copyright © 2026

files:
  - "dist/**/*"
  - "assets/**/*"
  - "!dist/renderer/src"

extraMetadata:
  main: dist/main.js

mac:
  category: public.app-category.social-networking
  target:
    - dmg
    - zip
  hardenedRuntime: true
  icon: assets/icon.png

win:
  target:
    - nsis
  icon: assets/icon.png

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: "friendlies-Setup-${version}.${ext}"

linux:
  target:
    - AppImage
  category: Network
  icon: assets/icon.png

protocols:
  - name: slippi-friends
    role: Viewer
    schemes:
      - slippi-friends

publish:
  provider: github
  owner: 0xburn
  repo: friendlies

directories:
  output: release
